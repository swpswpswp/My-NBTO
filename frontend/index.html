<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创业模拟决策系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <script src="https://unpkg.com/axios@1.7.9/dist/axios.min.js"></script>
  </head>
  <body class="bg-gradient-to-br from-purple-50 via-slate-50 to-fuchsia-50 text-slate-900">
    <div id="app"></div>
    <script>
      const TOKEN_KEY = "sim.token";
      const API_KEY = "sim.api";
      const MATCH_KEY = "sim.matchKey";

      const api = axios.create({
        baseURL: localStorage.getItem(API_KEY) || "http://localhost:8010",
        timeout: 15000,
      });

      function token() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }
      function matchKey() {
        return (localStorage.getItem(MATCH_KEY) || "").trim();
      }
      function setMatchKey(k) {
        localStorage.setItem(MATCH_KEY, (k || "").trim());
      }
      function mpath(p) {
        const mk = matchKey();
        if (!mk) throw new Error("match_key_required");
        return `/m/${encodeURIComponent(mk)}${p}`;
      }

      api.interceptors.request.use((c) => {
        const t = token();
        if (t) c.headers.Authorization = `Bearer ${t}`;
        return c;
      });

      function uuid() {
        if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
        const b = new Uint8Array(16);
        for (let i = 0; i < 16; i++) b[i] = (Math.random() * 256) | 0;
        b[6] = (b[6] & 0x0f) | 0x40;
        b[8] = (b[8] & 0x3f) | 0x80;
        const h = [...b].map((x) => x.toString(16).padStart(2, "0")).join("");
        return `${h.slice(0, 8)}-${h.slice(8, 12)}-${h.slice(12, 16)}-${h.slice(16, 20)}-${h.slice(20)}`;
      }

      function errMsg(e) {
        const d = e?.response?.data?.detail;
        return typeof d === "string" ? d : e?.message || "请求失败";
      }

      const UI = {
        btnPrimary: "px-3 py-2 bg-purple-600 text-white rounded-lg text-sm hover:bg-purple-700 disabled:opacity-50 disabled:cursor-not-allowed",
        btnGhost: "px-3 py-2 border border-slate-200 rounded-lg text-sm hover:bg-white/70",
        card: "bg-white/80 backdrop-blur border border-slate-200 rounded-xl shadow-sm",
        input: "w-full border border-slate-200 rounded-lg px-3 py-2 text-sm bg-white/80 focus:outline-none focus:ring-2 focus:ring-purple-200",
      };

      const Session = Vue.reactive({ me: null });

      const Auth = {
        setup() {
          const mode = Vue.ref("login"); // login | register
          const u = Vue.ref("");
          const p = Vue.ref("");
          const apiBase = Vue.ref(api.defaults.baseURL);
          const router = VueRouter.useRouter();
          const msg = Vue.ref("");
          async function testApi() {
            msg.value = "";
            try {
              const r = await axios.get(`${apiBase.value.replace(/\/$/, "")}/health`);
              msg.value = `API 可达：${JSON.stringify(r.data)}`;
            } catch (e) {
              msg.value = `API 不可达：${e.message}`;
            }
          }
          async function submit() {
            msg.value = "";
            try {
              localStorage.setItem(API_KEY, apiBase.value);
              api.defaults.baseURL = apiBase.value;
              if (mode.value === "register") {
                await api.post("/v2/auth/register", { username: u.value, password: p.value });
              }
              const r = await api.post("/v2/auth/login", { username: u.value, password: p.value });
              localStorage.setItem(TOKEN_KEY, r.data.access_token);
              router.push("/match");
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          return { mode, u, p, apiBase, msg, testApi, submit, UI };
        },
        template: `<div class="min-h-screen flex items-center justify-center p-4">
          <div class="w-full max-w-md ${UI.card} p-5 space-y-4">
            <div>
              <div class="text-lg font-semibold">创业模拟决策系统</div>
              <div class="text-xs text-slate-500 mt-1">紫色主题 · 多赛场 · 点对点交易</div>
            </div>

            <div class="flex gap-2 text-sm">
              <button type="button" @click="mode='login'" class="px-3 py-1.5 rounded-lg border" :class="mode==='login' ? 'border-purple-300 bg-purple-50 text-purple-700' : 'border-slate-200 hover:bg-white/60'">登录</button>
              <button type="button" @click="mode='register'" class="px-3 py-1.5 rounded-lg border" :class="mode==='register' ? 'border-purple-300 bg-purple-50 text-purple-700' : 'border-slate-200 hover:bg-white/60'">注册</button>
            </div>

            <div class="space-y-2">
              <label class="text-xs text-slate-500">API 地址</label>
              <input v-model="apiBase" class="${UI.input}" placeholder="http://localhost:8010" />
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                <div>
                  <label class="text-xs text-slate-500">用户名（至少 3 位）</label>
                  <input v-model="u" class="${UI.input}" placeholder="例如：s1x" />
                </div>
                <div>
                  <label class="text-xs text-slate-500">密码（至少 6 位）</label>
                  <input v-model="p" type="password" class="${UI.input}" placeholder="pass1234" />
                </div>
              </div>
            </div>

            <div class="flex gap-2">
              <button type="button" @click="testApi" class="${UI.btnGhost}">测试 API</button>
              <button type="button" @click="submit" class="${UI.btnPrimary} ml-auto">{{ mode==='login' ? '登录' : '注册并登录' }}</button>
            </div>

            <div class="text-sm text-rose-600 whitespace-pre-wrap">{{ msg }}</div>
            <div class="text-xs text-slate-500">
              提示：登录后需要选择赛场（match_key），再加入公司才能操作资产与交易。
            </div>
          </div>
        </div>`,
      };

      const MatchSelect = {
        setup() {
          const router = VueRouter.useRouter();
          const mk = Vue.ref(matchKey() || "matchB");
          const msg = Vue.ref("");
          async function go() {
            msg.value = "";
            try {
              setMatchKey(mk.value);
              // quick sanity: call /student/me in match scope
              await api.get(mpath("/student/me"));
              router.push("/app/overview");
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          return { mk, msg, go, UI };
        },
        template: `<div class="min-h-screen flex items-center justify-center p-4">
          <div class="w-full max-w-lg ${UI.card} p-5 space-y-4">
            <div class="flex items-center gap-2">
              <div class="text-lg font-semibold">选择赛场</div>
              <div class="ml-auto text-xs text-slate-500">路径模式：/m/&lt;match_key&gt;</div>
            </div>
            <div class="space-y-2">
              <label class="text-xs text-slate-500">赛场 Key（例如：matchA、matchB）</label>
              <input v-model="mk" class="${UI.input}" placeholder="matchB" />
              <div class="text-xs text-slate-500">进入后，该赛场内的数据与其他赛场完全隔离。</div>
            </div>
            <div class="flex gap-2">
              <RouterLink to="/" class="${UI.btnGhost}">返回登录</RouterLink>
              <button type="button" @click="go" class="${UI.btnPrimary} ml-auto">进入赛场</button>
            </div>
            <div class="text-sm text-rose-600 whitespace-pre-wrap">{{ msg }}</div>
          </div>
        </div>`,
      };

      const Layout = {
        setup() {
          const router = VueRouter.useRouter();
          const mk = Vue.computed(() => matchKey());
          const nav = Vue.reactive({ market: false, product: false, admin: false });
          async function loadMe() {
            try {
              const r = await api.get(mpath("/student/me"));
              Session.me = r.data;
            } catch {
              Session.me = null;
            }
          }
          Vue.onMounted(loadMe);
          function toggle(group) {
            nav[group] = !nav[group];
          }
          function logout() {
            localStorage.removeItem(TOKEN_KEY);
            Session.me = null;
            router.push("/");
          }
          function switchMatch() {
            router.push("/match");
          }
          return { Session, logout, mk, switchMatch, nav, toggle };
        },
        template: `<div class="min-h-screen flex flex-col md:flex-row">
          <aside class="w-full md:w-60 shrink-0 bg-white/70 backdrop-blur border-b md:border-b-0 md:border-r border-slate-200">
            <div class="p-4 border-b border-slate-100">
              <div class="font-semibold text-slate-900">创业模拟</div>
              <div class="text-xs text-purple-700 mt-1">赛场：<span class="font-mono">{{ mk || '未选择' }}</span></div>
            </div>
            <nav class="p-2 space-y-2 text-sm">
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/overview">总览</RouterLink>
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/wallet">资产与账本</RouterLink>
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/inventory">团队仓库</RouterLink>
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/facilities">设施中心</RouterLink>
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/mining">原料开采</RouterLink>
              <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/contracts">合同留痕</RouterLink>

              <button type="button" @click="toggle('market')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/70 border border-transparent">
                <span class="text-xs text-slate-500">市场交易</span>
                <span class="ml-auto text-slate-400 text-xs font-mono">{{ nav.market ? 'v' : '>' }}</span>
              </button>
              <div v-if="nav.market" class="pl-2 space-y-1">
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/transfer">公司转账（黄金/碳排）</RouterLink>
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/trade">公司交易（点对点）</RouterLink>
              </div>

              <button type="button" @click="toggle('product')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/70 border border-transparent">
                <span class="text-xs text-slate-500">产品中心</span>
                <span class="ml-auto text-slate-400 text-xs font-mono">{{ nav.product ? 'v' : '>' }}</span>
              </button>
              <div v-if="nav.product" class="pl-2 space-y-1">
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/recipes">配方中心</RouterLink>
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/manufacture">产品制造</RouterLink>
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/sales">产品销售</RouterLink>
              </div>

              <button type="button" @click="toggle('admin')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/70 border border-transparent">
                <span class="text-xs text-slate-500">管理</span>
                <span class="ml-auto text-slate-400 text-xs font-mono">{{ nav.admin ? 'v' : '>' }}</span>
              </button>
              <div v-if="nav.admin" class="pl-2 space-y-1">
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/audit">管理端查账</RouterLink>
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/rating">产品评分</RouterLink>
                <RouterLink class="block px-3 py-2 rounded-lg hover:bg-white/70" active-class="bg-purple-50 text-purple-800 border border-purple-100 font-medium" to="/app/admin">管理员</RouterLink>
              </div>
            </nav>
            <div class="p-3 text-xs text-slate-500 border-t border-slate-100 mt-auto">
              <div v-if="Session.me">{{ Session.me.username }}（{{ Session.me.role }}）</div>
              <div class="flex gap-2 mt-2">
                <button type="button" @click="switchMatch" class="flex-1 px-2 py-1.5 border rounded-lg hover:bg-white/70">切换赛场</button>
                <button type="button" @click="logout" class="flex-1 px-2 py-1.5 border rounded-lg hover:bg-white/70">退出</button>
              </div>
            </div>
          </aside>
          <main class="flex-1 p-4 md:p-6 overflow-auto">
            <RouterView />
          </main>
        </div>`,
      };

      const Overview = {
        setup() {
          const msg = Vue.ref("");
          const bal = Vue.ref(null);
          Vue.onMounted(async () => {
            msg.value = "";
            try {
              const r = await api.get(mpath("/student/me"));
              Session.me = r.data;
              if (Session.me.company_id) {
                const b = await api.get(mpath("/student/gold/balance"));
                bal.value = b.data;
              }
            } catch (e) {
              msg.value = errMsg(e);
            }
          });
          return { Session, msg, bal, UI };
        },
        template: `<div class="max-w-4xl space-y-4">
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold">总览</h1>
            <div class="ml-auto text-xs text-slate-500">主题：紫色调</div>
          </div>
          <div class="${UI.card} p-4">
            <div class="text-sm text-slate-600 mb-2">当前登录</div>
            <pre class="text-xs bg-white/60 p-3 rounded-lg overflow-auto border border-slate-100">{{ JSON.stringify(Session.me, null, 2) }}</pre>
            <p class="text-sm text-rose-600 mt-2">{{ msg }}</p>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div class="${UI.card} p-4">
              <div class="text-xs text-slate-500">是否已加入公司</div>
              <div class="text-lg font-semibold mt-1">{{ Session.me?.company_id ? '已加入' : '未加入' }}</div>
              <div class="text-xs font-mono text-slate-500 break-all mt-1" v-if="Session.me?.company_id">{{ Session.me.company_id }}</div>
            </div>
            <div class="${UI.card} p-4">
              <div class="text-xs text-slate-500">黄金余额</div>
              <div class="text-2xl font-semibold mt-1">{{ bal?.balance ?? '—' }}</div>
              <div class="text-xs text-slate-500 mt-1">需先加入公司并由管理员发放黄金</div>
            </div>
            <div class="${UI.card} p-4">
              <div class="text-xs text-slate-500">下一步</div>
              <div class="text-sm text-slate-700 mt-2 space-y-1">
                <div>1) 进入「加入公司」选择公司并输入加入密码</div>
                <div>2) 管理员导入公司并发放黄金/原料</div>
                <div>3) 使用「点对点交易」发起请求并让对方同意</div>
              </div>
              <div class="mt-3">
                <RouterLink to="/app/company" class="${UI.btnPrimary}">去加入公司</RouterLink>
              </div>
            </div>
          </div>
        </div>`,
      };

      const CompanyJoin = {
        setup() {
          const companies = Vue.ref([]);
          const companyId = Vue.ref("");
          const joinPwd = Vue.ref("");
          const msg = Vue.ref("");
          const ok = Vue.ref("");
          async function load() {
            msg.value = "";
            ok.value = "";
            try {
              const r = await api.get(mpath("/student/companies"));
              companies.value = r.data || [];
              if (!companyId.value && companies.value.length) companyId.value = companies.value[0].id;
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          async function join() {
            msg.value = "";
            ok.value = "";
            try {
              await api.post(mpath("/student/company/join"), { company_id: companyId.value, join_password: joinPwd.value });
              ok.value = "加入成功（比赛期间不可退出/换公司）";
              Session.me = (await api.get(mpath("/student/me"))).data;
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          Vue.onMounted(load);
          return { companies, companyId, joinPwd, msg, ok, load, join, UI, Session };
        },
        template: `<div class="max-w-3xl space-y-4">
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold">加入公司</h1>
            <button type="button" @click="load" class="${UI.btnGhost} ml-auto">刷新</button>
          </div>
          <p class="text-sm text-rose-600">{{ msg }}</p>
          <div class="${UI.card} p-4 space-y-3">
            <div class="text-sm text-slate-600">请选择公司并输入“公司加入密码”。加入后不可退出/换公司。</div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label class="text-xs text-slate-500">公司</label>
                <select v-model="companyId" class="${UI.input} mt-1">
                  <option v-for="c in companies" :key="c.id" :value="c.id">{{ c.name }}</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-slate-500">加入密码</label>
                <input v-model="joinPwd" type="password" class="${UI.input} mt-1" placeholder="例如：join1234" />
              </div>
            </div>
            <button type="button" @click="join" class="${UI.btnPrimary}" :disabled="!companyId || !joinPwd">确认加入</button>
            <p class="text-sm text-emerald-700">{{ ok }}</p>
            <div class="text-xs text-slate-500">当前 company_id：<span class="font-mono">{{ Session.me?.company_id || '—' }}</span></div>
          </div>
        </div>`,
      };

      const Wallet = {
        setup() {
          const bal = Vue.ref(null);
          const carbon = Vue.ref(null);
          const ledger = Vue.ref([]);
          const msg = Vue.ref("");
          async function load() {
            msg.value = "";
            try {
              const [b, c, l] = await Promise.all([
                api.get(mpath("/student/gold/balance")),
                api.get(mpath("/student/carbon/balance")),
                api.get(mpath("/student/ledger"), { params: { limit: 50 } }),
              ]);
              bal.value = b.data;
              carbon.value = c.data;
              ledger.value = l.data;
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          Vue.onMounted(load);
          return { bal, carbon, ledger, msg, load, UI };
        },
        template: `<div class="max-w-5xl space-y-4">
          <div class="flex items-center gap-3">
            <h1 class="text-xl font-semibold">资产与账本</h1>
            <button type="button" @click="load" class="${UI.btnGhost} ml-auto">刷新</button>
          </div>
          <p class="text-sm text-rose-600">{{ msg }}</p>
          <div v-if="bal" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="${UI.card} p-4">
              <div class="text-xs text-slate-500">黄金余额</div>
              <div class="text-2xl font-semibold mt-1">{{ bal.balance }}</div>
            </div>
            <div v-if="carbon" class="${UI.card} p-4">
              <div class="text-xs text-slate-500">碳排放指标余额</div>
              <div class="text-2xl font-semibold mt-1">{{ carbon.balance }}</div>
            </div>
            <div class="${UI.card} p-4"><div class="text-xs text-slate-500">公司 ID</div><div class="text-xs font-mono break-all mt-1">{{ bal.company_id }}</div></div>
          </div>
          <div class="${UI.card} overflow-hidden">
            <div class="px-4 py-2 border-b text-sm font-medium bg-white/60">账本流水（最新在前）</div>
            <div class="overflow-x-auto">
              <table class="min-w-full text-sm">
                <thead>
                  <tr class="text-left text-slate-500 border-b">
                    <th class="px-3 py-2">时间</th>
                    <th class="px-3 py-2">类型</th>
                    <th class="px-3 py-2">对手方</th>
                    <th class="px-3 py-2 text-right">黄金</th>
                    <th class="px-3 py-2 text-right">碳排</th>
                    <th class="px-3 py-2 text-right">原料</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="r in ledger" :key="r.id" class="border-b border-slate-100">
                    <td class="px-3 py-2 whitespace-nowrap text-xs">{{ r.created_at }}</td>
                    <td class="px-3 py-2 font-mono text-xs">{{ r.kind }}</td>
                    <td class="px-3 py-2 font-mono text-xs">{{ r.counterparty_company_id || '-' }}</td>
                    <td class="px-3 py-2 text-right" :class="r.gold_delta < 0 ? 'text-rose-600' : (r.gold_delta>0?'text-emerald-700':'text-slate-500')">{{ r.gold_delta }}</td>
                    <td class="px-3 py-2 text-right" :class="r.carbon_delta < 0 ? 'text-rose-600' : (r.carbon_delta>0?'text-emerald-700':'text-slate-500')">{{ r.carbon_delta }}</td>
                    <td class="px-3 py-2 text-right font-mono text-xs">{{ r.material ? (r.material + ' ' + (r.material_delta ?? 0)) : '-' }}</td>
                  </tr>
                  <tr v-if="!ledger.length"><td colspan="6" class="px-3 py-8 text-center text-slate-500">暂无记录</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>`,
      };

      const CarbonTransfer = {
        setup() {

        setup() {
          const msg = Vue.ref("");

          const ledger = Vue.ref([]);
          const audits = Vue.ref([]);
          const companyId = Vue.ref("");
          const kind = Vue.ref("");
          const action = Vue.ref("");
          const limit = Vue.ref(200);
          async function load() {
            msg.value = "";
            ok.value = "";
            try {
              const [l, a] = await Promise.all([
                api.get(mpath("/admin/ledger"), { params: { company_id: companyId.value || undefined, kind: kind.value || undefined, limit: Number(limit.value) } }),
                api.get(mpath("/admin/audit"), { params: { action: action.value || undefined, limit: Number(limit.value) } }),
              ]);
              ledger.value = l.data || [];
              audits.value = a.data || [];
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          function dl(path, params) {
            const base = (api.defaults.baseURL || "").replace(/\/$/, "");
            const url = new URL(base + mpath(path));
            Object.entries(params || {}).forEach(([k, v]) => {
              if (v !== undefined && v !== null && String(v).trim() !== "") url.searchParams.set(k, String(v));
            });
            const a = document.createElement("a");
            a.href = url.toString();
            a.target = "_blank";
            a.rel = "noopener";
            // token via header not possible with simple <a>; use fetch->blob
            return (async () => {
              try {
                const r = await fetch(url.toString(), { headers: { Authorization: `Bearer ${token()}` } });
                if (!r.ok) throw new Error(r.statusText);
                const blob = await r.blob();
                const d = document.createElement("a");
                d.href = URL.createObjectURL(blob);
                d.download = path.includes("ledger") ? "ledger.csv" : "audit.csv";
                d.click();
                URL.revokeObjectURL(d.href);
                ok.value = "已下载 CSV";
              } catch (e) {
                msg.value = e?.message || String(e);
              }
            })();
          }
          Vue.onMounted(load);
          return { msg, ok, ledger, audits, companyId, kind, action, limit, load, dl, UI };
        },

        setup() {
          const msg = Vue.ref("");
          const ok = Vue.ref("");
          const rows = Vue.ref([]);
          const code = Vue.ref("P001");
          const name = Vue.ref("新产品");
          const craft = Vue.ref("");
          const itemsText = Vue.ref("R1=2\nR2=1");
          async function load() {
            msg.value = "";
            ok.value = "";
            try {
              const r = await api.get(mpath("/student/recipes"));
              rows.value = r.data || [];
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          function parseItems() {
            const items = [];
            for (const line of (itemsText.value || "").split(/\r?\n/)) {
              const t = line.trim();
              if (!t) continue;
              const [m, q] = t.split("=");
              if (!m || !q) throw new Error("items 格式应为 每行 material=qty");
              items.push({ material: m.trim(), qty: Number(q.trim()) });
            }
            return items;
          }
          async function save() {
            msg.value = "";
            ok.value = "";
            try {
              const items = parseItems();
              await api.post(mpath("/student/recipe"), { product_code: code.value, product_name: name.value, craft: craft.value, items });
              ok.value = "已保存配方";
              await load();
            } catch (e) {
              msg.value = e?.message || errMsg(e);
            }
          }
          Vue.onMounted(load);
          return { msg, ok, rows, code, name, craft, itemsText, load, save, UI };

        setup() {
          const msg = Vue.ref("");

          const inv = Vue.ref({ raw: [], products: [] });

          async function load() {
            msg.value = "";
            ok.value = "";
            try {
              const [m, c, i, ib, ob] = await Promise.all([
                api.get(mpath("/student/me")),
                api.get(mpath("/student/companies")),
                api.get(mpath("/student/inventory")),
                api.get(mpath("/trade/requests/inbox")),
                api.get(mpath("/trade/requests/outbox")),
              ]);
              me.value = m.data;
              companies.value = c.data || [];
              inv.value = i.data || { raw: [], products: [] };
              inbox.value = ib.data || [];
              outbox.value = ob.data || [];
              if (!toCompanyId.value && companies.value.length) {
                const firstOther = companies.value.find((x) => x.id !== me.value?.company_id);
                if (firstOther) toCompanyId.value = firstOther.id;
              }
            } catch (e) {
              msg.value = errMsg(e);
            }
          }

          async function create() {
            msg.value = "";
            ok.value = "";
            try {
              const r = await api.post(mpath("/trade/request"), {
                to_company_id: toCompanyId.value,
                material: material.value,
                qty: Number(qty.value),
                unit_price: Number(unitPrice.value),
                idempotency_key: idem.value,
              });
              ok.value = `已发起请求：${r.data.id}`;
              idem.value = uuid();
              await load();
            } catch (e) {
              msg.value = errMsg(e);
            }
          }

          async function decide(id, decision) {
            msg.value = "";
            ok.value = "";
            try {
              await api.post(mpath(`/trade/request/${id}/decide`), { decision, idempotency_key: uuid() });
              ok.value = decision === "accept" ? "已同意并结算" : "已拒绝";
              await load();
            } catch (e) {
              msg.value = errMsg(e);
            }
          }

          const allInv = Vue.computed(() => [...(inv.value?.raw || []), ...(inv.value?.products || [])]);
          const invMap = Vue.computed(() => Object.fromEntries(allInv.value.map((x) => [x.material, x.qty])));
          const estTotal = Vue.computed(() => (Number(qty.value) || 0) * (Number(unitPrice.value) || 0));

          Vue.onMounted(load);
          const tradeType = Vue.ref("raw"); // raw | product
          const rawOptions = ["R1", "R2", "R3"];

          Vue.watch(
            tradeType,
            (t) => {

              else material.value = productOptions.value[0] || "P001";
            },
            { immediate: true }
          );
          return {
            msg,
            ok,
            companies,
            me,
            inv,
            inbox,
            outbox,
            toCompanyId,
            tradeType,
            rawOptions,
            productOptions,
            material,
            qty,
            unitPrice,
            idem,
            load,
            create,
            decide,
            invMap,
            estTotal,
            UI,

            msg.value = "";
            try {
              const [a, b] = await Promise.all([api.get("/student/my/listings"), api.get("/student/my/trades")]);
              listings.value = a.data;
              trades.value = b.data;
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          Vue.onMounted(load);
          return { listings, trades, msg, load };
        },
        template: `<div class="max-w-5xl space-y-4">
          <div class="flex items-center gap-2"><h1 class="text-xl font-semibold">我的交易</h1><button @click="load" class="ml-auto px-3 py-1.5 border rounded-lg text-sm">刷新</button></div>
          <p class="text-sm text-rose-600">{{ msg }}</p>
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
              <div class="px-3 py-2 border-b text-sm font-medium bg-slate-50">我的挂单</div>
              <table class="min-w-full text-sm">
                <thead><tr class="text-left text-slate-500 border-b"><th class="px-3 py-2">时间</th><th class="px-3 py-2">原料</th><th class="px-3 py-2 text-right">量</th><th class="px-3 py-2">状态</th></tr></thead>
                <tbody>
                  <tr v-for="L in listings" :key="L.id" class="border-b border-slate-100">
                    <td class="px-3 py-2 text-xs whitespace-nowrap">{{ L.created_at }}</td>
                    <td class="px-3 py-2">{{ L.material }}</td>
                    <td class="px-3 py-2 text-right">{{ L.qty }}</td>
                    <td class="px-3 py-2 text-xs">{{ L.status }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
              <div class="px-3 py-2 border-b text-sm font-medium bg-slate-50">我的成交</div>
              <table class="min-w-full text-sm">
                <thead><tr class="text-left text-slate-500 border-b"><th class="px-3 py-2">时间</th><th class="px-3 py-2">原料</th><th class="px-3 py-2 text-right">总价</th></tr></thead>
                <tbody>
                  <tr v-for="t in trades" :key="t.id" class="border-b border-slate-100">
                    <td class="px-3 py-2 text-xs whitespace-nowrap">{{ t.created_at }}</td>
                    <td class="px-3 py-2">{{ t.material }} × {{ t.qty }}</td>
                    <td class="px-3 py-2 text-right">{{ t.total_price }}</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>`,
      };

      const LegacyAdmin = {
        setup() {
          const cname = Vue.ref("系统公司A");
          const cid = Vue.ref("");
          const amount = Vue.ref(10000);
          const idem = Vue.ref(uuid());
          const msg = Vue.ref("");
          const ok = Vue.ref("");
          async function createCo() {
            msg.value = "";
            ok.value = "";
            try {
              const r = await api.post("/admin/companies", { name: cname.value });
              cid.value = r.data.id;
              ok.value = `公司已创建：${r.data.name}，ID：${r.data.id}`;
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          async function grant() {
            msg.value = "";
            ok.value = "";
            try {
              await api.post(`/admin/companies/${cid.value}/grant-gold`, null, {
                params: { amount: amount.value, idempotency_key: idem.value },
              });
              ok.value = "发放成功";
              idem.value = uuid();
            } catch (e) {
              msg.value = errMsg(e);
            }
          }
          return { cname, cid, amount, idem, msg, ok, createCo, grant };
        },
        template: `<div class="max-w-xl space-y-4">
          <h1 class="text-xl font-semibold">管理员</h1>
          <p class="text-sm text-slate-600">需使用 <code class="bg-slate-100 px-1 rounded">admin</code> 登录。先创建公司（可选）或把学生公司的 ID 粘贴到发放框。</p>
          <div class="bg-white border rounded-xl p-4 shadow-sm space-y-3">
            <label class="text-sm">新建公司名</label>
            <input v-model="cname" class="w-full border rounded-lg px-3 py-2" />
            <button type="button" @click="createCo" class="px-3 py-2 bg-slate-900 text-white rounded-lg text-sm">创建公司</button>
            <label class="text-sm">公司 ID（发放用）</label>
            <input v-model="cid" class="w-full border rounded-lg px-3 py-2 font-mono text-xs" placeholder="粘贴 company_id" />
            <label class="text-sm">发放黄金数量</label>
            <input type="number" min="1" v-model.number="amount" class="w-full border rounded-lg px-3 py-2" />
            <label class="text-sm">幂等键</label>
            <input v-model="idem" class="w-full border rounded-lg px-3 py-2 font-mono text-xs" />
            <button type="button" @click="grant" class="px-3 py-2 bg-emerald-600 text-white rounded-lg text-sm">发放黄金</button>
            <p class="text-sm text-rose-600">{{ msg }}</p>
            <p class="text-sm text-emerald-700">{{ ok }}</p>
          </div>
        </div>`,
      };

      async function legacyRequireAuth() {
        if (!token()) return "/";
        return true;
      }

      async function requireAuth() {
        if (!token()) return "/";
        return true;
      }
      async function requireMatch() {
        if (!token()) return "/";
        if (!matchKey()) return "/match";
        return true;
      }

      const routes = [
        { path: "/", component: Auth, meta: { guest: true } },
        { path: "/match", component: MatchSelect, beforeEnter: requireAuth },
        {
          path: "/app",
          component: Layout,
          beforeEnter: requireMatch,
          children: [
            { path: "", redirect: "/app/overview" },
            { path: "overview", component: Overview },
            { path: "company", component: CompanyJoin },
            { path: "wallet", component: Wallet },
            { path: "inventory", component: Inventory },
            { path: "transfer", component: Transfer },
            { path: "carbon", redirect: "/app/transfer" },
            { path: "facilities", component: FacilityCenter },
            { path: "mining", component: Mining },
            { path: "trade", component: Trade },
            { path: "contracts", component: Contracts },
            { path: "audit", component: AdminAudit },
            { path: "recipes", component: RecipeCenter },
            { path: "manufacture", component: ManufacturingCenter },
            { path: "sales", component: ProductSales },
            { path: "rating", component: AdminProductRating },
            { path: "admin", component: Admin },
          ],
        },
      ];

      const router = VueRouter.createRouter({
        history: VueRouter.createWebHashHistory(),
        routes,
      });

      const app = Vue.createApp({ template: "<RouterView/>" });
      app.use(router);
      app.mount("#app");
    </script>
  </body>
</html>
